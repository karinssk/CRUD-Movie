services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super_secret_change_in_production}
      CORS_ORIGIN: http://localhost:8081
      DB_PATH: /app/data/movies.db
      NODE_ENV: production
    volumes:
      - db_data:/app/data
    restart: unless-stopped

volumes:
  db_data:
